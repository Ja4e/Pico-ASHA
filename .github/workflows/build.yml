name: Build Pico-ASHA Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PICO_SDK_COMMIT_HASH: a1438dff1d38bd9c65dbd693f0e5db4b9ae91779
  TINYUSB_TAG: "0.20.0"

jobs:

  # =========================
  # PICO-ASHA FIRMWARE BUILD
  # =========================
  build_firmware:
    strategy:
      matrix:
        board: ["pico_w", "pico2_w"]

    name: Build Pico-ASHA for ${{ matrix.board }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: pico-asha

      - name: Checkout Pico SDK
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk
          submodules: recursive
          ref: "${{ env.PICO_SDK_COMMIT_HASH }}"
          fetch-depth: "0"

      - name: Checkout TinyUSB
        uses: actions/checkout@v6
        with:
          repository: hathach/tinyusb
          path: tinyusb
          submodules: recursive
          ref: "${{ env.TINYUSB_TAG }}"
          fetch-depth: "0"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib

      - name: Configure build
        run: |
          mkdir -p pico-asha/build/${{ matrix.board }}
          cd pico-asha/build/${{ matrix.board }}

          cmake \
            -DPICO_SDK_PATH=${{github.workspace}}/pico-sdk \
            -DPICO_TINYUSB_PATH=${{github.workspace}}/tinyusb \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DPICO_BOARD=${{ matrix.board }} \
            ../..

      - name: Compile
        run: |
          cd pico-asha/build/${{ matrix.board }}
          cmake --build .

      - name: Upload UF2 and ELF binaries
        uses: actions/upload-artifact@v4
        with:
          name: pico-asha-firmware-${{ matrix.board }}
          path: pico-asha/build/${{ matrix.board }}/pico_asha.[ue][fl][2f]


  # =========================
  # WINDOWS GUI BUILD
  # =========================
  build_gui_windows:
    name: Build GUI for Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.2.1
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtserialport'
          cache: 'true'
          cache-key-prefix: 'install-qt-action'
          setup-python: 'true'
          set-env: 'true'

      - name: Setup VS dev cmd
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Configure cmake (Ninja)
        run: |
          cd gui
          md build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -G "Ninja" ..

      - name: Compile GUI
        run: |
          cd gui\build
          cmake --build .

      - name: Install GUI
        run: |
          cd gui\build
          cmake --install . --prefix "$pwd\PicoASHAGui-Installed\PicoASHAGui"

      - name: Cleanup
        run: |
          cd gui\build\PicoASHAGui-Installed\PicoASHAGui\bin
          del dxcompiler.dll
          del dxil.dll

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: pico-asha-gui-win64
          path: gui/build/PicoASHAGui-Installed/PicoASHAGui


  # =========================
  # WAVESHARE RP2350B BUILD
  # =========================
  build_waveshare_rp2350b:
    name: Build Waveshare RP2350B Custom Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            build-essential \
            python3 \
            libnewlib-arm-none-eabi

      - name: Build mpy-cross
        run: |
          make -C mpy-cross

      - name: Patch Waveshare Pin Mapping
        run: |
          CONF="ports/rp2/boards/RPI_PICO2_W/mpconfigboard.h"

          # PSRAM config
          echo "#define MICROPY_HW_PSRAM_CS_PIN (47)" >> $CONF
          echo "#define MICROPY_HW_PSRAM_MAX_SEG_SIZE (8 * 1024 * 1024)" >> $CONF
          echo "#define MICROPY_HW_QMI_SUPPORT (1)" >> $CONF

          # WiFi pin remap (Waveshare RP2350B)
          echo "#define CYW43_PIN_WL_REG_ON (36)" >> $CONF
          echo "#define CYW43_PIN_WL_DATA (37)" >> $CONF
          echo "#define CYW43_PIN_WL_CS (38)" >> $CONF
          echo "#define CYW43_PIN_WL_CLK (39)" >> $CONF

          # Avoid PIO conflict
          echo "#define CYW43_PIO_INSTANCE 1" >> $CONF

      - name: Build Firmware
        run: |
          make -C ports/rp2 BOARD=RPI_PICO2_W BOARD_VARIANT=rp2350 -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-rp2350b-custom-firmware
          path: ports/rp2/build-RPI_PICO2_W/firmware.uf2
